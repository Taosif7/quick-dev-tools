<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Calendar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
    padding: 24px;
  }
  .container { max-width: 820px; margin: 0 auto; }

  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 8px; }
  .header h1 { font-size: 24px; font-weight: 700; color: #1e293b; }
  .header-right { display: flex; align-items: center; gap: 8px; }

  .btn {
    border-radius: 8px; padding: 8px 16px; font-size: 14px; font-weight: 600;
    border: 1px solid #e2e8f0; background: white; color: #475569; cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { background: #f8fafc; }
  .btn-view {
    padding: 8px 12px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all 0.15s;
  }
  .btn-view.active { background: #6366f1; color: white; border: 2px solid #6366f1; }
  .btn-view:not(.active) { background: white; color: #475569; border: 1px solid #e2e8f0; }

  .cat-selector { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .cat-selector span { font-size: 14px; font-weight: 500; color: #64748b; }
  .cat-btn {
    border-radius: 9999px; padding: 6px 16px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; border-width: 2px; border-style: solid;
  }

  .calendars { display: flex; gap: 24px; flex-wrap: wrap; }
  .month-grid { flex: 1; min-width: 280px; }
  .month-title { text-align: center; font-weight: 700; font-size: 18px; color: #1e293b; margin-bottom: 12px; }
  .day-headers { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
  .day-header { text-align: center; font-size: 12px; font-weight: 600; color: #64748b; }
  .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }

  .day-cell {
    height: 48px; display: flex; align-items: center; justify-content: center;
    border-radius: 8px; font-size: 14px; font-weight: 400; transition: all 0.15s;
    position: relative; border: 1px solid #e2e8f0; background: white; color: #334155;
    cursor: pointer; flex-direction: column;
  }
  .day-cell.weekend {
    background: #f1f5f9; color: #94a3b8; opacity: 0.6; cursor: default;
  }
  .day-cell.today { border: 2px solid #6366f1; font-weight: 700; }
  .day-cell.marked { font-weight: 600; border-width: 2px; }
  .day-cell .date-num { margin-top: -4px; }
  .day-cell .cat-label {
    position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
    font-size: 7px; font-weight: 700; letter-spacing: 0.5px;
  }
  .day-cell:not(.weekend):hover { transform: scale(1.05); }

  .summary { display: flex; align-items: center; justify-content: center; gap: 24px; margin-top: 24px; flex-wrap: wrap; }
  .summary-item {
    display: flex; align-items: center; gap: 8px; border-radius: 8px; padding: 8px 16px;
  }
  .summary-dot { width: 12px; height: 12px; border-radius: 3px; }
  .summary-text { font-size: 14px; font-weight: 600; }

  .hint { text-align: center; font-size: 12px; color: #94a3b8; margin-top: 16px; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <button class="btn" onclick="navigate(-1)">← Prev</button>
    <h1>Work Calendar</h1>
    <div class="header-right">
      <button class="btn-view" id="view1" onclick="setView(1)">1M</button>
      <button class="btn-view active" id="view2" onclick="setView(2)">2M</button>
      <button class="btn" onclick="navigate(1)">Next →</button>
    </div>
  </div>

  <div class="cat-selector" id="catSelector"></div>
  <div class="calendars" id="calendars"></div>
  <div class="summary" id="summary"></div>
  <p class="hint">Click any weekday to toggle. Click again to remove. Weekends are disabled.</p>
</div>

<script>
const CATEGORIES = {
  WFH:     { label: "WFH",     color: "#3b82f6", bg: "#dbeafe", border: "#93c5fd" },
  LEAVE:   { label: "Leave",   color: "#ef4444", bg: "#fee2e2", border: "#fca5a5" },
  HOLIDAY: { label: "Holiday", color: "#f59e0b", bg: "#fef3c7", border: "#fcd34b" },
};
const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

let baseYear = new Date().getFullYear();
let baseMonth = new Date().getMonth();
let selectedCat = "WFH";
let viewMode = 2;
let markings = {};

function navigate(dir) {
  baseMonth += dir;
  if (baseMonth > 11) { baseMonth = 0; baseYear++; }
  if (baseMonth < 0) { baseMonth = 11; baseYear--; }
  render();
}

function setView(n) {
  viewMode = n;
  document.getElementById("view1").className = "btn-view" + (n === 1 ? " active" : "");
  document.getElementById("view2").className = "btn-view" + (n === 2 ? " active" : "");
  render();
}

function selectCat(cat) {
  selectedCat = cat;
  renderCatSelector();
}

function toggleDate(key) {
  if (markings[key] === selectedCat) delete markings[key];
  else markings[key] = selectedCat;
  render();
}

function renderCatSelector() {
  const el = document.getElementById("catSelector");
  el.innerHTML = '<span>Click dates to mark as:</span>';
  for (const [key, val] of Object.entries(CATEGORIES)) {
    const active = selectedCat === key;
    const btn = document.createElement("button");
    btn.className = "cat-btn";
    btn.textContent = val.label;
    btn.style.background = active ? val.color : "white";
    btn.style.color = active ? "white" : val.color;
    btn.style.borderColor = val.color;
    btn.style.transform = active ? "scale(1.05)" : "scale(1)";
    btn.style.boxShadow = active ? `0 2px 8px ${val.color}44` : "none";
    btn.onclick = () => selectCat(key);
    el.appendChild(btn);
  }
}

function buildMonth(year, month) {
  const firstDay = new Date(year, month, 1).getDay();
  const offset = firstDay === 0 ? 6 : firstDay - 1;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();

  const wrap = document.createElement("div");
  wrap.className = "month-grid";

  const title = document.createElement("div");
  title.className = "month-title";
  title.textContent = `${MONTHS[month]} ${year}`;
  wrap.appendChild(title);

  const headers = document.createElement("div");
  headers.className = "day-headers";
  DAYS.forEach(d => {
    const h = document.createElement("div");
    h.className = "day-header";
    h.textContent = d;
    headers.appendChild(h);
  });
  wrap.appendChild(headers);

  const grid = document.createElement("div");
  grid.className = "days-grid";

  for (let i = 0; i < offset; i++) grid.appendChild(document.createElement("div"));

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(year, month, d);
    const dow = date.getDay();
    const isWeekend = dow === 0 || dow === 6;
    const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === d;
    const key = `${year}-${month}-${d}`;
    const cat = markings[key];
    const catDef = cat ? CATEGORIES[cat] : null;

    const cell = document.createElement("div");
    let cls = "day-cell";
    if (isWeekend) cls += " weekend";
    if (isToday) cls += " today";
    if (catDef) cls += " marked";
    cell.className = cls;

    if (catDef) {
      cell.style.background = catDef.bg;
      cell.style.borderColor = catDef.border;
      cell.style.color = catDef.color;
    }

    const num = document.createElement("span");
    num.className = "date-num";
    num.textContent = d;
    cell.appendChild(num);

    if (catDef) {
      const lbl = document.createElement("span");
      lbl.className = "cat-label";
      lbl.style.color = catDef.color;
      lbl.textContent = catDef.label.toUpperCase();
      cell.appendChild(lbl);
    }

    if (!isWeekend) cell.onclick = () => toggleDate(key);
    grid.appendChild(cell);
  }

  wrap.appendChild(grid);
  return wrap;
}

function renderSummary() {
  const el = document.getElementById("summary");
  el.innerHTML = "";
  const counts = { WFH: 0, LEAVE: 0, HOLIDAY: 0 };
  Object.values(markings).forEach(v => counts[v]++);

  for (const [key, val] of Object.entries(CATEGORIES)) {
    const item = document.createElement("div");
    item.className = "summary-item";
    item.style.background = val.bg;
    item.style.border = `1px solid ${val.border}`;

    const dot = document.createElement("div");
    dot.className = "summary-dot";
    dot.style.background = val.color;
    item.appendChild(dot);

    const txt = document.createElement("span");
    txt.className = "summary-text";
    txt.style.color = val.color;
    txt.textContent = `${val.label}: ${counts[key]} day${counts[key] !== 1 ? "s" : ""}`;
    item.appendChild(txt);

    el.appendChild(item);
  }
}

function render() {
  renderCatSelector();
  const cal = document.getElementById("calendars");
  cal.innerHTML = "";
  cal.appendChild(buildMonth(baseYear, baseMonth));
  if (viewMode === 2) {
    let m2 = baseMonth + 1, y2 = baseYear;
    if (m2 > 11) { m2 = 0; y2++; }
    cal.appendChild(buildMonth(y2, m2));
  }
  renderSummary();
}

render();
</script>
</body>
</html>
